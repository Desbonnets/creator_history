services:

  # ═══════════════════════════════════════
  # DÉVELOPPEMENT
  # ═══════════════════════════════════════

  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend-dev
    profiles:
      - dev

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_data:/app/data
      - backend_backups:/app/backups
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - ADMIN_IDENTIFIER=${ADMIN_IDENTIFIER:-admin}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-Admin@2024!}
    profiles:
      - dev

  # ═══════════════════════════════════════
  # PRODUCTION
  # ═══════════════════════════════════════

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend-prod
    profiles:
      - prod

  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    volumes:
      - backend_data:/app/data
      - backend_backups:/app/backups
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_IDENTIFIER=${ADMIN_IDENTIFIER}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
    profiles:
      - prod

volumes:
  backend_data:
  backend_backups:
